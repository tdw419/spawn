schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    adapter:
      config:
        hermesCommand: "/home/jericho/zion/projects/aipm/bin/aipm_hermes_generic.sh"
        model: "glm-5.1"
        persistSession: true
        timeoutSec: 300
      type: "hermes_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 120
    permissions:
      canCreateAgents: true
  rust-engineer:
    role: "engineer"
    adapter:
      config:
        hermesCommand: "/home/jericho/zion/projects/aipm/bin/aipm_hermes_generic.sh"
        model: "glm-5.1"
        timeoutSec: 600
      type: "hermes_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 60
projects:
  phase-1-the-machine-runs:
    color: "#6366f1"
    status: "completed"
  phase-2-the-machine-speaks:
    color: "#8b5cf6"
    status: "backlog"
  phase-3-the-machine-writes-programs:
    color: "#ec4899"
    status: "backlog"
  phase-4-the-machine-improves-itself:
    color: "#ef4444"
    status: "backlog"
sidebar:
  agents:
    - "ceo"
    - "rust-engineer"
  projects:
    - "phase-1-the-machine-runs"
    - "phase-2-the-machine-speaks"
    - "phase-3-the-machine-writes-programs"
    - "phase-4-the-machine-improves-itself"
